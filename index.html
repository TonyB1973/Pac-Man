<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
  <meta name="theme-color" content="#050713">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Maze Munch 2 — an original offline retro maze chase game.">
  <link rel="manifest" href="manifest.webmanifest?v=21">
  <link rel="icon" href="icons/icon.svg?v=21">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.svg?v=211">
  <link rel="stylesheet" href="styles.css?v=21">
  <title>Maze Munch 2</title>
</head>
<body>
  <div class="app">
    <header class="hud">
      <div class="brand">
        <span class="eyebrow">OFFLINE ARCADE PWA</span>
        <h1>MAZE MUNCH <b>2</b></h1>
      </div>
      <div class="hud-actions">
        <button id="soundBtn" class="round-btn" aria-label="Toggle sound">🔊</button>
        <button id="pauseBtn" class="round-btn" aria-label="Pause">Ⅱ</button>
      </div>
    </header>

    <section class="scorebar">
      <div><small>SCORE</small><strong id="score">000000</strong></div>
      <div><small>HIGH</small><strong id="highScore">000000</strong></div>
      <div><small>LEVEL</small><strong id="level">01</strong></div>
      <div><small>LIVES</small><strong id="lives">●●●</strong></div>
    </section>

    <main class="cabinet">
      <div class="screen">
        <canvas id="gameCanvas" width="560" height="620"></canvas>
        <div id="overlay" class="overlay visible">
          <div class="hero-mark"><span></span></div>
          <h2 id="overlayTitle">MAZE MUNCH 2</h2>
          <p id="overlayText">Clear the maze, collect power orbs and outrun the chasers.</p>
          <button id="startBtn" class="start-btn">START GAME</button>
          <small>Use the joystick, swipe, Arrow keys or WASD</small>
        </div>
        <div id="readyText" class="ready-text">READY!</div>
      </div>
    </main>

    <section class="control-deck">
      <div class="joystick-zone">
        <div id="joystick" class="joystick" aria-label="Movement joystick">
          <div class="joy-arrows">
            <span class="n">▲</span><span class="e">▶</span>
            <span class="s">▼</span><span class="w">◀</span>
          </div>
          <div id="joystickKnob" class="joystick-knob"></div>
        </div>
        <div id="directionLabel" class="direction-label">JOYSTICK</div>
      </div>

      <div class="deck-buttons">
        <button id="newGameBtn" class="deck-btn primary">NEW GAME</button>
        <button id="installBtn" class="deck-btn" hidden>INSTALL APP</button>
        <div class="help-card">
          <span><i class="pellet"></i> Pellet</span>
          <span><i class="orb"></i> Power orb</span>
          <span><i class="ghost"></i> Chaser</span>
        </div>
      </div>
    </section>

    <footer>
      <span>MAZE MUNCH 2 • BUILD 2.1.0</span>
      <span>PHONE • TABLET • DESKTOP</span>
    </footer>
  </div>
  <script src="app.js?v=21"></script>
</body>
</html>
